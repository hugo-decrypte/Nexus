networks:
  nexus.net:
    driver: bridge

services:
  # frontend Vue.js (build Vite servi par nginx)
  web.nexus:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - '5173:80'
    networks:
      - nexus.net
    depends_on:
      - api.nexus

  # service api.toubeelib : api pour la prise de rdv
  #
  api.nexus:
    build:
      context: build
      dockerfile: 8.4-cli.Dockerfile
    ports:
      - '6080:80'
    volumes:
      - ./api/app:/var/php
    working_dir: /var/php
    networks:
      - nexus.net
    depends_on:
      - nexus.db
      - mailer
    command: sh -c "composer install && php -S 0.0.0.0:80 -t /var/php/public"

    # service toubiprat.db : base de données postgresql pour les praticiens

  nexus.db:
    image: 'postgres:latest'
    env_file: ./nexus.env
    ports:
      - '5432:5432'
    networks:
      - nexus.net
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d

  #
  # service administration des bases sql
  #
  adminer:
    image: adminer
    ports:
      - '8080:8080'
    networks:
      - nexus.net
    command: php -S 0.0.0.0:8080 -t /var/www/html

  #
  # service mail
  #
#  mailer:
#    image: bytemark/smtp
#    restart: always
#    ports:
#      - "2525:25"
#    networks:
#      - nexus.net
#    environment:
#      - REMOTE_SMARTHOST=in-v3.mailjet.com
#      - REMOTE_PORT=587
#      - SMTP_USER=${MAILJET_API_KEY}
#      - SMTP_PASSWORD=${MAILJET_SECRET_KEY}

  mailer:
    image: axllent/mailpit
    container_name: nexus-mailer
    restart: always
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - nexus.net